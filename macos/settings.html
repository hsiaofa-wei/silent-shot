<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilentShot 设置</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    margin: 0; padding: 32px 16px; background: Canvas; color: CanvasText;
    display: flex; justify-content: center;
  }
  .card {
    width: 100%; max-width: 560px;
    background: color-mix(in srgb, Canvas 92%, CanvasText 8%);
    border-radius: 14px; padding: 28px 28px 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,.18);
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { font-size: 13px; opacity: .65; margin: 0 0 22px; }
  .row { display: flex; align-items: center; margin-bottom: 14px; gap: 12px; }
  .row label.name { flex: 0 0 96px; text-align: right; font-size: 13px; opacity: .85; }
  input[type=text], select, #hotkey {
    flex: 1; padding: 7px 10px; font-size: 13px; border-radius: 8px;
    border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
    background: Canvas; color: CanvasText;
  }
  #hotkey { cursor: pointer; text-align: center; font-weight: 600; letter-spacing: 1px; }
  #hotkey.recording { border-color: #e0563f; color: #e0563f; }
  .checks { margin: 6px 0 6px 108px; display: grid; gap: 9px; }
  .checks label { font-size: 13px; display: flex; align-items: center; gap: 7px; }
  .radio { display: flex; gap: 16px; }
  .radio label { font-size: 13px; display: flex; align-items: center; gap: 5px; }
  .actions { display: flex; gap: 10px; margin: 22px 0 16px; }
  button {
    padding: 9px 16px; font-size: 13px; border-radius: 8px; border: 0; cursor: pointer;
    background: #3b6ef0; color: #fff; font-weight: 600;
  }
  button.secondary { background: color-mix(in srgb, CanvasText 14%, transparent); color: CanvasText; }
  pre {
    background: color-mix(in srgb, CanvasText 6%, Canvas); border-radius: 8px;
    padding: 12px 14px; font-size: 12px; overflow: auto; margin: 0;
    border: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
  }
  .hint { font-size: 12px; opacity: .65; line-height: 1.6; margin-top: 14px; }
  code { background: color-mix(in srgb, CanvasText 10%, transparent); padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
<div class="card">
  <h1>SilentShot 设置</h1>
  <p class="sub">生成 <code>config.json</code>，保存到 <code>~/.config/silentshot/config.json</code> 即可。</p>

  <div class="row">
    <label class="name" for="hotkey">热键</label>
    <div id="hotkey" tabindex="0">⌃⌥S</div>
  </div>
  <div class="row">
    <label class="name" for="saveDirectory">保存到</label>
    <input type="text" id="saveDirectory" value="~/Pictures/Screenshots">
  </div>
  <div class="row">
    <label class="name" for="filenamePrefix">文件名前缀</label>
    <input type="text" id="filenamePrefix" value="shot">
  </div>
  <div class="row">
    <label class="name">图片格式</label>
    <div class="radio">
      <label><input type="radio" name="fmt" value="png" checked> PNG</label>
      <label><input type="radio" name="fmt" value="jpg"> JPG</label>
    </div>
  </div>

  <div class="checks">
    <label><input type="checkbox" id="captureAllDisplays"> 截取所有显示器</label>
    <label><input type="checkbox" id="playShutterSound"> 截图时播放提示音</label>
    <label><input type="checkbox" id="showMenuBarIcon" checked> 在菜单栏显示图标</label>
    <label><input type="checkbox" id="launchAtLogin"> 开机自启</label>
  </div>

  <div class="actions">
    <button onclick="download()">下载 config.json</button>
    <button class="secondary" onclick="copyJSON()">复制 JSON</button>
  </div>

  <pre id="preview"></pre>

  <p class="hint">
    热键：点上面的「热键」框，然后按下你想要的组合键（需含至少一个修饰键）。<br>
    应用方式：把下载/复制的内容存为 <code>~/.config/silentshot/config.json</code>，
    再到菜单栏 SilentShot →「重新载入配置」，或重启 App。
  </p>
</div>

<script>
  // 热键以人类可读串存储，例如 "ctrl+option+s"，与 macOS App 共用同一 schema。
  let hotkey = "ctrl+option+s";

  function tokenFromCode(e) {
    const c = e.code;
    if (c.startsWith("Key")) return c.slice(3).toLowerCase();     // KeyS -> s
    if (c.startsWith("Digit")) return c.slice(5);                  // Digit1 -> 1
    if (/^F\d{1,2}$/.test(c)) return c.toLowerCase();              // F5 -> f5
    const named = { Space: "space", Enter: "return", Tab: "tab",
                    Minus: "-", Equal: "=", BracketLeft: "[", BracketRight: "]",
                    Semicolon: ";", Quote: "'", Comma: ",", Period: ".",
                    Slash: "/", Backslash: "\\", Backquote: "`" };
    return named[c] || null;
  }

  function display(str) {
    const parts = str.toLowerCase().split("+").map(s => s.trim()).filter(Boolean);
    let mods = "", key = "?";
    for (const p of parts) {
      if (p === "ctrl" || p === "control") mods += "⌃";
      else if (p === "option" || p === "opt" || p === "alt") mods += "⌥";
      else if (p === "shift") mods += "⇧";
      else if (p === "cmd" || p === "command" || p === "meta") mods += "⌘";
      else key = p.length === 1 ? p.toUpperCase() : p[0].toUpperCase() + p.slice(1);
    }
    return mods + key;
  }

  const hotkeyBox = document.getElementById("hotkey");
  hotkeyBox.addEventListener("click", startRecording);
  hotkeyBox.addEventListener("focus", startRecording);

  function startRecording() {
    hotkeyBox.classList.add("recording");
    hotkeyBox.textContent = "按下热键…";
    const handler = (e) => {
      e.preventDefault();
      if (e.key === "Escape") { stop(); return; }
      const mods = [];
      if (e.ctrlKey) mods.push("ctrl");
      if (e.altKey) mods.push("option");
      if (e.shiftKey) mods.push("shift");
      if (e.metaKey) mods.push("cmd");
      const key = tokenFromCode(e);
      if (mods.length === 0 || !key) return;  // 需要至少一个修饰键
      hotkey = [...mods, key].join("+");
      stop();
      render();
    };
    function stop() {
      hotkeyBox.classList.remove("recording");
      hotkeyBox.textContent = display(hotkey);
      window.removeEventListener("keydown", handler, true);
      hotkeyBox.blur();
    }
    window.addEventListener("keydown", handler, true);
  }

  function gather() {
    return {
      hotkey: hotkey,
      saveDirectory: document.getElementById("saveDirectory").value || "~/Pictures/Screenshots",
      filenamePrefix: document.getElementById("filenamePrefix").value || "shot",
      imageFormat: document.querySelector('input[name=fmt]:checked').value,
      captureAllDisplays: document.getElementById("captureAllDisplays").checked,
      playShutterSound: document.getElementById("playShutterSound").checked,
      showMenuBarIcon: document.getElementById("showMenuBarIcon").checked,
      launchAtLogin: document.getElementById("launchAtLogin").checked,
    };
  }

  function json() { return JSON.stringify(gather(), null, 2); }

  function render() {
    hotkeyBox.textContent = display(hotkey);
    document.getElementById("preview").textContent = json();
  }

  function download() {
    const blob = new Blob([json()], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "config.json";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  async function copyJSON() {
    try { await navigator.clipboard.writeText(json()); alert("已复制到剪贴板"); }
    catch { alert("复制失败，请手动从下方预览框选取。"); }
  }

  document.querySelectorAll("input, select").forEach(el => el.addEventListener("input", render));
  render();
</script>
</body>
</html>
